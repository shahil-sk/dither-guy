name: Build Executables (fix branches)

# Runs on every push to any branch matching fix/** or bugfix/**
# Does NOT run on main / master or on tag pushes (those are handled
# by the existing main.yml release workflow).
on:
  push:
    branches:
      - 'fix/**'
      - 'bugfix/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (must already exist)'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build DitherGuy executable
        run: |
          pyinstaller --clean --noconfirm `
            --name="DitherGuy" `
            --onefile `
            --windowed `
            --icon=app_icon.png `
            --add-data="app_icon.png;." `
            --hidden-import=PySide6.QtCore `
            --hidden-import=PySide6.QtGui `
            --hidden-import=PySide6.QtWidgets `
            --hidden-import=PIL `
            --hidden-import=PIL.Image `
            --hidden-import=PIL.ImageFilter `
            --hidden-import=PIL.ImageEnhance `
            --hidden-import=numpy `
            --hidden-import=cv2 `
            --hidden-import=shiboken6 `
            --hidden-import=utils `
            --hidden-import=utils.constants `
            --hidden-import=utils.palettes `
            --hidden-import=utils.matrices `
            --hidden-import=utils.dither_kernels `
            --hidden-import=utils.presets `
            --hidden-import=utils.batch `
            --hidden-import=utils.theme `
            --hidden-import=utils.workers `
            --hidden-import=utils.ui_widgets `
            --hidden-import=utils.ui_control_panel `
            --hidden-import=utils.ui_tabs `
            --hidden-import=utils.ui_dialogs `
            --noconsole `
            main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DitherGuy-Windows-beta
          path: dist/DitherGuy.exe
          retention-days: 14

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxkbcommon-x11-0 \
            libxcb-xkb1 \
            libegl1 \
            libfontconfig1 \
            libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build DitherGuy executable
        run: |
          pyinstaller --clean --noconfirm \
            --name="DitherGuy" \
            --onefile \
            --windowed \
            --hidden-import=PySide6.QtCore \
            --hidden-import=PySide6.QtGui \
            --hidden-import=PySide6.QtWidgets \
            --hidden-import=PIL \
            --hidden-import=PIL.Image \
            --hidden-import=PIL.ImageFilter \
            --hidden-import=PIL.ImageEnhance \
            --hidden-import=numpy \
            --hidden-import=cv2 \
            --hidden-import=shiboken6 \
            --hidden-import=utils \
            --hidden-import=utils.constants \
            --hidden-import=utils.palettes \
            --hidden-import=utils.matrices \
            --hidden-import=utils.dither_kernels \
            --hidden-import=utils.presets \
            --hidden-import=utils.batch \
            --hidden-import=utils.theme \
            --hidden-import=utils.workers \
            --hidden-import=utils.ui_widgets \
            --hidden-import=utils.ui_control_panel \
            --hidden-import=utils.ui_tabs \
            --hidden-import=utils.ui_dialogs \
            main.py

      - name: Make executable
        run: chmod +x dist/DitherGuy

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DitherGuy-Linux-beta
          path: dist/DitherGuy
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build DitherGuy executable
        run: |
          pyinstaller --clean --noconfirm \
            --name="DitherGuy" \
            --onefile \
            --windowed \
            --hidden-import=PySide6.QtCore \
            --hidden-import=PySide6.QtGui \
            --hidden-import=PySide6.QtWidgets \
            --hidden-import=PIL \
            --hidden-import=PIL.Image \
            --hidden-import=PIL.ImageFilter \
            --hidden-import=PIL.ImageEnhance \
            --hidden-import=numpy \
            --hidden-import=cv2 \
            --hidden-import=shiboken6 \
            --hidden-import=utils \
            --hidden-import=utils.constants \
            --hidden-import=utils.palettes \
            --hidden-import=utils.matrices \
            --hidden-import=utils.dither_kernels \
            --hidden-import=utils.presets \
            --hidden-import=utils.batch \
            --hidden-import=utils.theme \
            --hidden-import=utils.workers \
            --hidden-import=utils.ui_widgets \
            --hidden-import=utils.ui_control_panel \
            --hidden-import=utils.ui_tabs \
            --hidden-import=utils.ui_dialogs \
            main.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DitherGuy-macOS-beta
          path: dist/DitherGuy
          retention-days: 14
